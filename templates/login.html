{% extends "base.html" %}
{% block titulo %}Entrar — Minhas Finanças{% endblock %}
{% block conteudo %}
<div class="cartao-auth">
  <div class="auth-logo">💰</div>
  <h1>Minhas Finanças</h1>
  <p class="subtitulo">Controle suas receitas, gastos e dívidas</p>

  <form method="POST" class="formulario">
    <label>E-mail
      <input type="email" name="email" required autocomplete="email" placeholder="voce@email.com">
    </label>
    <label>Senha
      <input type="password" name="senha" required autocomplete="current-password" placeholder="Sua senha">
    </label>
    <button type="submit" class="botao botao-primario">Entrar</button>
  </form>

  <p class="auth-rodape">Não tem conta? <a href="{{ url_for('registrar') }}">Cadastre-se</a></p>
</div>
{% endblock %}
